<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fat Cat Pizza Showdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

canvas{
    display:block;
}

#ui-layer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:100;
}

/* ================= MENU ================= */

#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(
        135deg,
        #ff6b35,
        #f7931e
    );
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    pointer-events:auto;
}

#menu h1{
    color:white;
    margin-bottom:30px;
}

#menu button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* ================= HUD ================= */

#hud{
    display:none;
    position:absolute;
    top:20px;
    left:20px;
    right:20px;
    justify-content:space-between;
}

#stats,
#controls{
    background:rgba(0,0,0,0.7);
    color:white;
    padding:15px;
    border-radius:10px;
}

/* ================= CONTROL PANEL ================= */

#controls-panel{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:none;
    gap:10px;
    pointer-events:auto;
}

#controls-panel button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2196f3;
    color:white;
    cursor:pointer;
}

#controls-panel button:hover{
    background:#1976d2;
}

/* ================= GAME OVER ================= */

#game-over{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.9);
    color:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    display:none;
    pointer-events:auto;
}

#game-over button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>

<!-- IMPORT MAP -->
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

</head>
<body>

<div id="ui-layer">

    <!-- MENU -->
    <div id="menu">
        <h1>🍕 FAT CAT PIZZA SHOWDOWN 🐱</h1>

        <button id="btn-start">
            Start Game
        </button>

        <button id="btn-instructions">
            Instructions
        </button>
    </div>

    <!-- HUD -->
    <div id="hud">

        <div id="stats">
            ❤️ HP:
            <span id="hp">300</span>
            <br>

            🍕 Pizza:
            <span id="pizza">0</span>
            <br>

            ⭐ Score:
            <span id="score">0</span>
        </div>

        <div id="controls">
            W A S D = Move<br>
            Collect Pizza<br>
            Avoid Enemy
        </div>

    </div>

    <!-- BUTTON PANEL -->
    <div id="controls-panel">

        <button id="btn-rotate">
            🔄 Rotate
        </button>

        <button id="btn-scale-up">
            ➕ Scale +
        </button>

        <button id="btn-scale-down">
            ➖ Scale -
        </button>

        <button id="btn-reset">
            🔃 Reset
        </button>

        <button id="btn-pause">
            ⏸ Pause
        </button>

    </div>

    <!-- GAME OVER -->
    <div id="game-over">

        <h2>GAME OVER</h2>

        <p>
            Score:
            <span id="final-score">
                0
            </span>
        </p>

        <button id="btn-restart">
            Play Again
        </button>

        <button id="btn-main-menu">
            Main Menu
        </button>

    </div>

</div>

<script type="module" src="./game.js"></script>

</body>
</html>
